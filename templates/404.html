<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Not Found | LinkTrim</title>
    
    <!-- Bootstrap 5 & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at bottom left, #4158D0, #C850C0 46%, #FFCC70 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #ffffff, rgba(255, 255, 255, 0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -5px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .message {
            color: white;
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .btn-home {
            background: white;
            color: #C850C0;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            background: #f8f9fa;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            color: #4158D0;
        }

        /* Decorative blobs for extra flair */
        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            border-radius: 50%;
            opacity: 0.6;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="glass-container text-center animate__animated animate__zoomIn">
        <div class="error-code">404</div>
        <h2 class="text-white fw-bold mb-3">Link Vanished!</h2>
        <p class="message">
            This link has either expired, was entered incorrectly, or has moved to a new universe.
        </p>
        <a href="/" class="btn-home">Back to Safety</a>
    </div>

    <!-- Background Decoration -->
    <div class="blob" style="width: 300px; height: 300px; background: #FFCC70; top: 10%; right: 10%;"></div>
    <div class="blob" style="width: 400px; height: 400px; background: #4158D0; bottom: -5%; left: -5%;"></div>

</body>
</html>
