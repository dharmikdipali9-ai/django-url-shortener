<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkTrim | URL Shortener</title>

    <!-- Bootstrap 5 & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at top right, #4158D0, #C850C0 46%, #FFCC70 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .header-icon {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #4158D0, #C850C0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 2px solid #eee;
        }

        .form-control:focus {
            border-color: #C850C0;
            box-shadow: none;
        }

        .btn-shorten {
            background: linear-gradient(45deg, #4158D0, #C850C0);
            border: none;
            border-radius: 12px;
            padding: 12px 25px;
            font-weight: 600;
            color: white;
            transition: opacity 0.3s;
        }

        .btn-shorten:hover {
            opacity: 0.9;
            color: white;
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px dashed #C850C0;
        }

        .short-link {
            font-weight: 700;
            color: #4158D0;
            text-decoration: none;
            word-break: break-all;
        }

        .copy-btn {
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="header-icon mb-2">🔗</div>
                    <h2 class="fw-bold text-dark">LinkTrim</h2>
                    <p class="text-muted">Make your long URLs short and sweet.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Paste your long link</label>
                        <input type="url" name="url" class="form-control" placeholder="https://example.com/very-long-link..." required>
                    </div>
                    <button class="btn btn-shorten w-100 mb-3 shadow-sm">Shorten URL</button>
                </form>

                {% if short_url %}
                <div class="result-box p-3 mt-4 animate__animated animate__fadeIn">
                    <label class="small fw-bold text-muted d-block mb-1">Success! Your link is ready:</label>
                    <div class="d-flex align-items-center justify-content-between">
                        <a href="{{ short_url }}" id="shortUrl" target="_blank" class="short-link">{{ short_url }}</a>
                        <span class="badge bg-dark copy-btn ms-2" onclick="copyToClipboard()">Copy</span>
                    </div>
                </div>
                {% endif %}

            </div>
            <p class="text-center mt-4 text-white-50 small">&copy; 2024 LinkTrim Inc. Simplified connectivity.</p>
        </div>
    </div>
</div>

<script>
    function copyToClipboard() {
        const url = document.getElementById('shortUrl').innerText;
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'Copied!';
            btn.classList.replace('bg-dark', 'bg-success');
            setTimeout(() => {
                btn.innerText = 'Copy';
                btn.classList.replace('bg-success', 'bg-dark');
            }, 2000);
        });
    }
</script>

</body>
</html>
